services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
        VITE_PUBLIC_SITE_URL: ${VITE_PUBLIC_SITE_URL:-https://naamsplay.games}
    ports:
      - "8098:80"
